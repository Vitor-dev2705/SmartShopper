<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SmartShopper</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #007bff; --success: #27ae60; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        #map { flex: 1; width: 100%; z-index: 1; }
        .sidebar { 
            height: 35%; background: white; z-index: 10; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); border-radius: 20px 20px 0 0;
            padding: 15px; overflow-y: auto;
        }
        @media (min-width: 768px) {
            .app-container { flex-direction: row; }
            .sidebar { width: 380px; height: 100%; border-radius: 0; }
        }
        .card { 
            background: #fff; border: 1px solid #eee; border-radius: 10px;
            padding: 12px; margin-bottom: 10px; display: flex; 
            justify-content: space-between; align-items: center;
            transition: 0.3s; cursor: pointer;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .price { color: var(--success); font-weight: bold; font-size: 1.2rem; }
        .distance { font-size: 0.8rem; color: #666; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 5px;
            background: #ddd; z-index: 9999; display: none;
        }
        .loading-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        .btn-rota {
            display: block; background: var(--success); color: white; 
            text-align: center; padding: 8px; border-radius: 5px; 
            text-decoration: none; margin-top: 8px; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader"><div class="loading-bar" id="bar"></div></div>

<div class="app-container">
    <div id="map"></div>
    <div class="sidebar">
        <h2 style="margin-top:0">Melhores Precos</h2>
        <div id="ranking">
            <p style="color:#999; text-align:center">Mova o mapa para buscar...</p>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map, markers = L.layerGroup();

    function setupMap(lat, lon) {
        map = L.map('map', { zoomControl: false }).setView([lat, lon], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        markers.addTo(map);
        
        L.circleMarker([lat, lon], { radius: 6, color: '#007bff', fillOpacity: 1 }).addTo(map);
        buscarPrecos(lat, lon);

        map.on('moveend', () => {
            const c = map.getCenter();
            buscarPrecos(c.lat, c.lng);
        });
    }

    async function buscarPrecos(lat, lon) {
        document.getElementById('loader').style.display = 'block';
        document.getElementById('bar').style.width = '70%';
        
        try {
            const res = await fetch(`/v1/buscar-barato?lat=${lat}&lon=${lon}`);
            const data = await res.json();
            
            markers.clearLayers();
            const rankingDiv = document.getElementById('ranking');
            rankingDiv.innerHTML = '';

            data.recomendacoes.forEach((m) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div>
                        <strong>${m.nome}</strong><br>
                        <span class="distance">Distancia: ${m.distancia_km.toFixed(2)}km</span>
                    </div>
                    <div class="price">R$ ${m.preco.toFixed(2)}</div>
                `;
                card.onclick = () => map.flyTo([m.lat, m.lon], 17);
                rankingDiv.appendChild(card);

                const popupContent = `
                    <div style="text-align:center">
                        <strong>${m.nome}</strong><br>
                        <b style="color:var(--success)">R$ ${m.preco.toFixed(2)}</b><br>
                        <a href="https://www.google.com/maps/search/?api=1&query=${m.lat},${m.lon}" target="_blank" class="btn-rota">VER ROTA</a>
                    </div>
                `;

                L.marker([m.lat, m.lon]).addTo(markers).bindPopup(popupContent);
            });
        } catch (e) {
            console.error(e);
        }
        
        document.getElementById('bar').style.width = '100%';
        setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
    }

    navigator.geolocation.getCurrentPosition(
        p => setupMap(p.coords.latitude, p.coords.longitude),
        () => setupMap(-15.8177, -48.1051)
    );
</script>
</body>
</html>
